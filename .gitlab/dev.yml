deploy_frontend_dev:
  stage: deploy
  image: node:20
  environment:
    name: dev
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - npm install
    - npm install -g wrangler
    - export CLOUDFLARE_API_TOKEN="$CLOUDFLARE_API_TOKEN_DEV"
    - export CLOUDFLARE_ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID_DEV"
    - |
      echo "VITE_FE_MAIN_MF=$FE_MAIN_URL_DEV" > .env
      echo "VITE_NODE_ENV=dev" >> .env

      npm run build    
    - wrangler deploy --name $THIS_APP_NAME

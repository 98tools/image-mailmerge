name: (dev) [fe+mf] Deploy to Cloudflare Workers

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Build frontend + microfrontend
        env:
          VITE_FE_MAIN_MF: ${{ vars.VITE_FE_MAIN_MF }}
          VITE_NODE_ENV: ${{ vars.VITE_NODE_ENV }}
          VITE_ALLOWED_ORIGINS: ${{ vars.VITE_ALLOWED_ORIGINS }}
        run: npm run build

      - name: Deploy worker
        run: npx wrangler deploy --name image-mailmerge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}